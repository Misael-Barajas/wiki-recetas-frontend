<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <h3 class="text-center fw-bold text-dark mb-4">Crear cuenta</h3>

          @if (mensajeExito) {
            <div class="alert alert-success text-center shadow-sm">
              {{ mensajeExito }}
            </div>
          }
          @if (mensajeError) {
            <div class="alert alert-danger text-center shadow-sm">
              {{ mensajeError }}
            </div>
          }

          <form [formGroup]="registroForm" (ngSubmit)="registrarUsuario()">
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre completo</label>
              <input type="text" class="form-control" formControlName="nombre" placeholder="Ej. Carlos Mendoza">
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Correo electrónico</label>
              <input type="email" class="form-control" formControlName="correo" placeholder="ejemplo@correo.com">
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Contraseña</label>
              <input type="password" class="form-control" formControlName="password_hash" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="d-grid gap-3">
              <button type="submit" class="btn btn-dark btn-lg fw-bold" [disabled]="registroForm.invalid">
                Registrarme
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <p class="text-muted mb-0">¿Ya tienes una cuenta?</p>
            <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Inicia sesión aquí</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
