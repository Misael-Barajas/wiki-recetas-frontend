<div class="container mt-4 mb-5">
  <h2 class="mb-4">Administrar categorías</h2>
  
  <div class="row">
    <div class="col-md-4 mb-4">
      <form [formGroup]="formularioCategoria" (ngSubmit)="guardarCategoria()" class="card p-4 shadow-sm border-0 bg-white">
        <h5 class="fw-bold mb-3">{{ modoEdicion ? 'Editar categoría' : 'Nueva categoría' }}</h5>
        
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" formControlName="nombre_categoria">
        </div>
        <div class="mb-3">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" rows="3" formControlName="descripcion"></textarea>
        </div>
        
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="formularioCategoria.invalid">Guardar</button>
          @if (modoEdicion) { <button type="button" class="btn btn-secondary" (click)="limpiarFormulario()">Cancelar</button> }
        </div>
      </form>
    </div>

    <div class="col-md-8">
      <div class="card p-3 shadow-sm border-0 bg-white table-responsive">
        <table class="table align-middle">
          <thead class="table-dark">
            <tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr>
          </thead>
          <tbody>
            @for (cat of listaCategorias; track cat.id_categoria) {
              <tr>
                <td>{{ cat.id_categoria }}</td>
                <td class="fw-bold">{{ cat.nombre_categoria }}</td>
                <td>{{ cat.descripcion }}</td>
                <td>
                  <div class="btn-group btn-group-sm">
                    <button class="btn btn-warning" (click)="seleccionar(cat)">Editar</button>
                    <button class="btn btn-danger" (click)="borrarCategoria(cat.id_categoria)">Borrar</button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
